<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'결과: ' + ${current.label()}">결과</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<div class="container">
    <a href="/" class="back">← 돌아가기</a>
    <header>
        <h1 th:text="${current.label()}">라벨</h1>
        <div class="meta">
            <span th:text="'영상 길이: ' + ${#numbers.formatDecimal(current.durationSec(), 1, 1)} + 's'">95.5s</span>
            ·
            <span th:text="'생성: ' + ${current.createdAt()}">생성 시각</span>
        </div>
    </header>

    <section class="player-section">
        <video id="player" controls preload="metadata"
               th:src="@{'/videos/' + ${current.videoFilename()}}"
               class="player"></video>
    </section>

    <section class="timeline-section">
        <h2>관찰 타임라인</h2>
        <p class="hint">막대를 클릭하면 영상이 해당 시점으로 점프</p>
        <div id="timeline" class="timeline"></div>
    </section>

    <section class="observations-section">
        <h2>관찰 노트 (<span id="obsCount">0</span>건)</h2>
        <div class="filter-bar" id="filterBar"></div>
        <ol id="observationList" class="observation-list"></ol>
    </section>

    <section class="transcript-section">
        <h2>트랜스크립트</h2>
        <ol id="transcriptList" class="transcript-list"></ol>
    </section>

    <div id="resultData"
         th:attr="data-current=${currentJson}"
         hidden></div>
</div>

<script th:src="@{/app.js}"></script>
</body>
</html>
