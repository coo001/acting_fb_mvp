<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'결과: ' + ${current.label()}">결과</title>
    <link rel="stylesheet" th:href="@{/style.css}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="container">
    <a href="/" class="back">← 돌아가기</a>
    <header>
        <h1 th:text="${current.label()}">라벨</h1>
        <div class="meta">
            <span th:text="'영상 길이: ' + ${#numbers.formatDecimal(current.durationSec(), 1, 1)} + 's'">95.5s</span>
            ·
            <span th:text="'생성: ' + ${current.createdAt()}">생성 시각</span>
        </div>
    </header>

    <div class="compare-bar">
        <label for="compareSelect">이전 결과와 비교:</label>
        <select id="compareSelect">
            <option value="">선택 안 함</option>
            <option th:each="o : ${others}"
                    th:value="${o.id()}"
                    th:text="${o.label()} + ' (' + ${o.createdAt()} + ')'"
                    th:selected="${compareWithId != null and compareWithId == o.id()}">옵션</option>
        </select>
        <span th:if="${compare != null}" class="compare-active">
            비교 중: <strong th:text="${compare.label()}">비교 라벨</strong>
        </span>
    </div>

    <section class="chart-block">
        <h2>감정 강도 (0~10)</h2>
        <div class="chart-wrap"><canvas id="emotionChart"></canvas></div>
    </section>

    <section class="chart-block">
        <h2>발화 속도 (WPM)</h2>
        <div class="chart-wrap"><canvas id="speechChart"></canvas></div>
    </section>

    <section class="chart-block">
        <h2>침묵 구간 (0.8s 이상)</h2>
        <div th:if="${compare != null}" class="silence-pair">
            <div>
                <h3 th:text="${current.label()}">현재</h3>
                <div class="chart-wrap"><canvas id="silenceCurrent"></canvas></div>
            </div>
            <div>
                <h3 th:text="${compare.label()}">비교</h3>
                <div class="chart-wrap"><canvas id="silenceCompare"></canvas></div>
            </div>
        </div>
        <div th:if="${compare == null}" class="chart-wrap">
            <canvas id="silenceChart"></canvas>
        </div>
    </section>

    <div id="resultData"
         th:attr="data-current=${currentJson}, data-compare=${compareJson}, data-current-id=${current.videoId()}"
         hidden></div>
</div>

<script th:src="@{/app.js}"></script>
</body>
</html>
